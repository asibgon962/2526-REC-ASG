name: Docker CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - src/**
  pull_request:
    branches: [ main ]
    paths:
      - src/**

jobs:
  build:
    name: build and push Docker image
    runs-on: ubuntu-latest
    steps: 
      # 1 
      - uses: actions/checkout@v4
      # 2  
      - name: Login to DockerHub
        uses: docker/login-action@v3 
        with:
          username: ${{ secrets.DH_USER_REC }}
          password: ${{ secrets.DH_TOKEN_REC }}
      # 3   
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true 
          tags: ${{ secrets.DH_USER_REC }}/rec:latest

  # cÃ³digo aÃ±adido
  aws:
    name: Deploy image to aws
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    # 1
    - name: copy docker compose via ssh key  
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_IP_REC }}
        username: ${{ secrets.EC2_USER_REC }}
        port: 22 # ${{ secrets.PORT }}
        key: ${{ secrets.EC2_KEY_REC }}
        source: "compose.yaml"
        target: /home/ubuntu
    # 2
    - name: script deploy docker services 
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_IP_REC }}
        username: ${{ secrets.EC2_USER_REC }}
        key: ${{ secrets.EC2_KEY_REC}}
        port: 22  # ${{ secrets.PORT }}
        script: |
            sleep 60
            sudo docker compose down --rmi all
            sudo docker compose up -d